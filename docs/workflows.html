<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>StorePilotAI · 包与组件工作流可视化</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0f1419;
    --panel: #161c24;
    --panel-2: #1d242e;
    --border: #2a3340;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-muted: #6e7681;
    --accent: #58a6ff;
    --accent-2: #d2a8ff;
    --green: #56d364;
    --amber: #d29922;
    --red: #f85149;
    --pink: #ff7b72;
    --node-external: #2d2418;
    --node-api: #15293f;
    --node-bridge: #1d2433;
    --node-mastra: #221b34;
    --node-workflow: #1a2d2a;
    --node-storage: #2d1f29;
    --node-tool: #2a2418;
    --node-contract: #1c2a1c;
    --node-mcp: #2d1c2d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
    font-size: 13px; line-height: 1.55;
    overflow-x: hidden;
  }
  header {
    padding: 18px 24px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  header .sub {
    color: var(--text-dim);
    font-size: 12px;
  }
  header .legend {
    margin-top: 10px;
    display: flex; gap: 14px; flex-wrap: wrap;
    font-size: 11px; color: var(--text-dim);
  }
  header .legend span.dot {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 3px; margin-right: 4px; vertical-align: middle;
  }
  nav#action-bar {
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
    display: flex; gap: 6px; flex-wrap: wrap;
    align-items: center;
  }
  nav#action-bar .cat-group {
    display: flex; align-items: center; gap: 6px;
    margin-right: 6px;
  }
  nav#action-bar .cat-label {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 0 4px 0 8px;
    border-left: 2px solid var(--border);
  }
  nav#action-bar button {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  nav#action-bar button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  nav#action-bar button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d1117;
    font-weight: 600;
  }
  main {
    display: grid;
    grid-template-columns: 1fr 380px;
    height: calc(100vh - 138px);
    min-height: 600px;
  }
  #graph-wrap {
    position: relative;
    overflow: auto;
    background:
      radial-gradient(circle at 20% 30%, rgba(88, 166, 255, 0.04), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(210, 168, 255, 0.04), transparent 50%),
      var(--bg);
  }
  #graph-svg {
    display: block;
    min-width: 1280px;
    width: 100%;
  }
  .col-label {
    fill: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .col-divider {
    stroke: var(--border);
    stroke-width: 1;
    stroke-dasharray: 4 4;
  }
  .node rect {
    stroke: var(--border);
    stroke-width: 1;
    rx: 6; ry: 6;
    transition: all 0.2s;
  }
  .node text.title {
    fill: var(--text);
    font-size: 12px;
    font-weight: 600;
    pointer-events: none;
  }
  .node text.sub {
    fill: var(--text-muted);
    font-size: 10px;
    pointer-events: none;
  }
  .node.type-external rect { fill: var(--node-external); }
  .node.type-api rect { fill: var(--node-api); }
  .node.type-bridge rect { fill: var(--node-bridge); }
  .node.type-mastra rect { fill: var(--node-mastra); }
  .node.type-workflow rect { fill: var(--node-workflow); }
  .node.type-storage rect { fill: var(--node-storage); }
  .node.type-tool rect { fill: var(--node-tool); }
  .node.type-contract rect { fill: var(--node-contract); }
  .node.type-mcp rect { fill: var(--node-mcp); }
  .node.dim rect { opacity: 0.25; }
  .node.dim text { opacity: 0.35; }
  .node.active rect {
    stroke: var(--accent);
    stroke-width: 2;
    filter: drop-shadow(0 0 8px rgba(88, 166, 255, 0.5));
  }
  .node.terminal rect {
    stroke: var(--accent-2);
    stroke-width: 2;
  }
  .node.highlight rect {
    stroke: var(--amber);
    stroke-width: 2.5;
    filter: drop-shadow(0 0 10px rgba(210, 153, 34, 0.6));
  }
  .edge {
    fill: none;
    stroke: var(--border);
    stroke-width: 1;
    opacity: 0.4;
    transition: all 0.2s;
  }
  .edge.active {
    stroke: var(--accent);
    stroke-width: 2;
    opacity: 1;
    filter: drop-shadow(0 0 4px rgba(88, 166, 255, 0.4));
  }
  .edge.highlight {
    stroke: var(--amber);
    stroke-width: 3;
    opacity: 1;
    filter: drop-shadow(0 0 6px rgba(210, 153, 34, 0.5));
  }
  .edge-label {
    fill: var(--text);
    font-size: 10px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .edge-label.active { opacity: 1; }
  .edge-label rect {
    fill: var(--bg);
    stroke: var(--accent);
    stroke-width: 1;
    rx: 8; ry: 8;
  }
  .edge-label.highlight rect {
    stroke: var(--amber);
  }
  .step-number {
    fill: #0d1117;
    font-size: 10px;
    font-weight: 700;
    text-anchor: middle;
    pointer-events: none;
  }
  .step-circle {
    fill: var(--accent);
    stroke: var(--bg);
    stroke-width: 2;
  }
  .step-circle.highlight {
    fill: var(--amber);
  }
  aside#detail {
    border-left: 1px solid var(--border);
    background: var(--panel);
    overflow-y: auto;
    padding: 20px 22px;
  }
  aside#detail .flow-title {
    font-size: 16px;
    font-weight: 700;
    margin: 0 0 4px;
    color: var(--text);
  }
  aside#detail .flow-category {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--panel-2);
    color: var(--accent);
    border: 1px solid var(--border);
    margin-bottom: 10px;
  }
  aside#detail .flow-desc {
    color: var(--text-dim);
    font-size: 12px;
    margin-bottom: 14px;
    padding: 10px 12px;
    background: var(--panel-2);
    border-radius: 6px;
    border-left: 3px solid var(--accent);
  }
  aside#detail .flow-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  aside#detail .flow-meta .tag {
    padding: 1px 7px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--panel-2);
  }
  aside#detail .flow-meta .tag.risk {
    color: var(--red);
    border-color: var(--red);
  }
  aside#detail .flow-meta .tag.gated {
    color: var(--amber);
    border-color: var(--amber);
  }
  aside#detail h3 {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 18px 0 8px;
    font-weight: 600;
  }
  ol.steps {
    list-style: none;
    padding: 0; margin: 0;
    counter-reset: step-counter;
  }
  ol.steps li {
    position: relative;
    padding: 10px 12px 10px 38px;
    margin-bottom: 6px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    counter-increment: step-counter;
  }
  ol.steps li:hover {
    border-color: var(--accent);
  }
  ol.steps li.focus {
    border-color: var(--amber);
    background: rgba(210, 153, 34, 0.08);
  }
  ol.steps li::before {
    content: counter(step-counter);
    position: absolute;
    left: 10px; top: 10px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    color: #0d1117;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  ol.steps li.focus::before {
    background: var(--amber);
  }
  ol.steps .step-edge {
    font-size: 12px;
    color: var(--text);
    font-weight: 600;
    margin-bottom: 3px;
  }
  ol.steps .step-edge .arrow {
    color: var(--accent);
    margin: 0 4px;
  }
  ol.steps .step-payload {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    word-break: break-word;
  }
  ol.steps .step-note {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    font-style: italic;
  }
  .empty-state {
    color: var(--text-muted);
    text-align: center;
    padding: 60px 20px;
    font-size: 13px;
  }
  .empty-state .icon {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.4;
  }
  .footer-tip {
    color: var(--text-muted);
    font-size: 11px;
    margin-top: 24px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
  }
  .footer-tip code {
    background: var(--panel-2);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <h1>StorePilotAI · 包与组件工作流可视化</h1>
  <div class="sub">点击上方任一动作按钮,高亮其在包/组件间的流转路径,并查看右侧步骤详情。所有数据由内嵌 JSON 驱动,可直接修改下方 <code>&lt;script type="application/json"&gt;</code> 块扩展。</div>
  <div class="legend">
    <span><span class="dot" style="background:#2d2418"></span>外部系统</span>
    <span><span class="dot" style="background:#15293f"></span>API 路由层</span>
    <span><span class="dot" style="background:#1d2433"></span>Bridge 桥接层</span>
    <span><span class="dot" style="background:#221b34"></span>Mastra Agent</span>
    <span><span class="dot" style="background:#1a2d2a"></span>Workflow</span>
    <span><span class="dot" style="background:#2d1c2d"></span>MCP / 工具</span>
    <span><span class="dot" style="background:#2d1f29"></span>持久化</span>
    <span><span class="dot" style="background:#1c2a1c"></span>共享契约</span>
    <span><span class="dot" style="background:#2a2418"></span>运维工具</span>
  </div>
</header>

<nav id="action-bar"></nav>

<main>
  <div id="graph-wrap">
    <svg id="graph-svg" viewBox="0 0 1600 1100" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <aside id="detail">
    <div class="empty-state">
      <div class="icon">⌬</div>
      <div>请从上方选择一个动作以查看其工作流</div>
    </div>
  </aside>
</main>

  "flows": [

      "id": "startup",
      "title": "服务启动 · 六行绿灯",

      "description": "开发期不依赖真实 ERP:agent-service 连 mcp-mock-server,提供与生产 schema 完全一致的 16 个工具回包(V1 7 + V2 9)。",
      "tags": ["dev", "mock"],
      "steps": [
        { "from": "operator", "to": "mcp-mock", "label": "pnpm dev:mcp", "payload": "启动 mcp-mock-server :PORT" },
        { "from": "operator", "to": "chat-completions", "label": "pnpm dev:agent", "payload": "MCP_BASE_URL=http://localhost:..." },
        { "from": "chat-completions", "to": "mcp-client", "label": "verifyMcpToolsAtStartup", "note": "对 mock 服务做白名单 + schema 校验" },
        { "from": "mcp-client", "to": "mcp-mock", "label": "tools/list + tools/call", "payload": "fixtures 驱动" },
        { "from": "mcp-mock", "to": "contracts-mcp", "label": "schema 来自 shared-contracts", "note": "禁止 mock 与契约漂移" },
        { "from": "lobechat", "to": "chat-completions", "label": "本地走 V1 / V2 全链路", "payload": "全部回包来自 mock" }
      ]
    },
    {
      "id": "seed-strategy",
      "title": "种入商家策略",
      "category": "运维",
      "description": "通过 tools/seed-strategy 写入 platform/merchant/store 三级策略;Store > Merchant > Platform 合并形成 EffectiveStrategy。",
      "tags": ["seed", "strategy"],
      "steps": [
        { "from": "operator", "to": "tool-seed", "label": "pnpm seed:strategy --file ...", "payload": "JSON 策略文件" },
        { "from": "tool-seed", "to": "mysql", "label": "INSERT/UPDATE strategy 三级表", "payload": "{ allowAutoPurchaseOrder:false, requireUserConfirmForWrite:true, ... }", "note": "R-STR-002 / R-STR-003 安全开关 V1 不可改" },
        { "from": "tool-seed", "to": "operator", "label": "✓ seeded" },
        { "from": "lobechat", "to": "chat-completions", "label": "后续业务请求", "payload": "workflow 内读取 EffectiveStrategy" },
        { "from": "chat-completions", "to": "wf-forecast", "label": "Workflow 合并策略", "payload": "Store > Merchant > Platform" }
      ]
    },
    {
      "id": "collect-requirement",
      "title": "缺参数追问 (Requirement Collector)",
      "category": "V1 业务",
      "description": "用户指令字段不全时,intent-classifier 输出 COLLECT_REQUIREMENT,由 requirement-collector Agent 追问缺失字段后再回到主链路。",
      "tags": ["dialog", "V1"],
      "steps": [
        { "from": "lobechat", "to": "chat-completions", "label": "POST /v1/chat/completions", "payload": "messages: '改一下补货数量'" },
        { "from": "chat-completions", "to": "intent-classifier", "label": "分类", "payload": "Intent.COLLECT_REQUIREMENT (字段不全)" },
        { "from": "intent-classifier", "to": "requirement-collector", "label": "AgentBundle.requirementCollector.generate" },
        { "from": "requirement-collector", "to": "session", "label": "读上下文 (上轮 draftId)", "payload": "AgentSession 短期上下文" },
        { "from": "requirement-collector", "to": "llm", "label": "LLM 生成追问问题", "payload": "缺失: skuId / qty" },
        { "from": "requirement-collector", "to": "sse", "label": "追问输出" },
        { "from": "sse", "to": "lobechat", "label": "'请问要调整哪个 SKU?'", "note": "用户答完后回到 ADJUST_REPLENISHMENT_DRAFT 主链路" }
      ]
    },
    {
      "id": "health-check",
      "title": "健康检查 (liveness / readiness)",
      "category": "运维",
      "description": "/health liveness 完全自包含;readiness 才依赖 DB/MCP/LLM。避免外部抖动导致容器反复重启。",
      "tags": ["k8s", "probe"],
      "steps": [
        { "from": "k8s", "to": "health", "label": "GET /health", "payload": "kubelet liveness probe" },
        { "from": "health", "to": "k8s", "label": "200 OK { status: 'ok' }", "note": "liveness 不依赖 DB/MCP/LLM" },
        { "from": "k8s", "to": "health", "label": "GET /health?ready=1", "payload": "readiness probe" },
        { "from": "health", "to": "mysql-storage", "label": "ping()" },
        { "from": "health", "to": "mcp-client", "label": "isConnected()" },
        { "from": "health", "to": "k8s", "label": "200 / 503", "note": "readiness 失败 → 摘流量但不重启" }
      ]
    }
  ]
}
</script>

<script>
(function () {
  'use strict';

  const data = JSON.parse(document.getElementById('workflow-data').textContent);
  const svg = document.getElementById('graph-svg');
  const SVG_NS = 'http://www.w3.org/2000/svg';

  const COL_WIDTH = 230;
  const COL_GAP = 0;
  const NODE_W = 200;
  const NODE_H = 56;
  const NODE_VGAP = 18;
  const TOP_PADDING = 50;
  const LEFT_PADDING = 30;

  function el(tag, attrs, parent) {
    const e = document.createElementNS(SVG_NS, tag);
    if (attrs) {
      for (const k in attrs) {
        e.setAttribute(k, attrs[k]);
      }
    }
    if (parent) parent.appendChild(e);
    return e;
  }

  // 计算每列节点 y 坐标
  const colMap = {};
  data.columns.forEach((c, i) => {
    colMap[c.id] = { index: i, label: c.label, count: 0 };
  });
  data.nodes.forEach(n => {
    const c = colMap[n.column];
    n._x = LEFT_PADDING + c.index * (COL_WIDTH + COL_GAP);
    n._y = TOP_PADDING + c.count * (NODE_H + NODE_VGAP);
    n._cx = n._x + NODE_W / 2;
    n._cy = n._y + NODE_H / 2;
    c.count++;
  });

  // 计算画布高度
  const maxCount = Math.max(...Object.values(colMap).map(c => c.count));
  const totalHeight = TOP_PADDING + maxCount * (NODE_H + NODE_VGAP) + 40;
  const totalWidth = LEFT_PADDING + data.columns.length * (COL_WIDTH + COL_GAP) - COL_GAP + LEFT_PADDING;
  svg.setAttribute('viewBox', `0 0 ${totalWidth} ${totalHeight}`);
  svg.style.minHeight = totalHeight + 'px';

  // 绘列标题 + 分隔
  data.columns.forEach((c, i) => {
    const x = LEFT_PADDING + i * (COL_WIDTH + COL_GAP) + NODE_W / 2;
    el('text', {
      x, y: 26,
      class: 'col-label',
      'text-anchor': 'middle'
    }, svg).textContent = c.label;
    if (i > 0) {
      const dx = LEFT_PADDING + i * (COL_WIDTH + COL_GAP) - 10;
      el('line', {
        x1: dx, y1: 10, x2: dx, y2: totalHeight - 10,
        class: 'col-divider'
      }, svg);
    }
  });

  // 构建节点 id → 节点
  const nodeMap = {};
  data.nodes.forEach(n => { nodeMap[n.id] = n; });

  // 计算唯一边 (节点 A -> 节点 B 仅画一条物理路径,多条 flow 共用)
  const edgeKey = (a, b) => `${a}→${b}`;
  const edgeMap = {};

  function cubicPath(x1, y1, x2, y2) {
    const dx = x2 - x1;
    const mx = x1 + dx * 0.5;
    // 同向 (左→右) 大曲率,反向稍微外突
    const c1x = x1 + Math.max(40, Math.abs(dx) * 0.4);
    const c2x = x2 - Math.max(40, Math.abs(dx) * 0.4);
    return `M ${x1} ${y1} C ${c1x} ${y1}, ${c2x} ${y2}, ${x2} ${y2}`;
  }

  // 先收集所有 flow 涉及的边并绘制(置于节点下方)
  data.flows.forEach(f => {
    f.steps.forEach((s, idx) => {
      const a = nodeMap[s.from], b = nodeMap[s.to];
      if (!a || !b) {
        console.warn('Missing node for step', s);
        return;
      }
      const k = edgeKey(s.from, s.to);
      if (!edgeMap[k]) {
        // 计算锚点(节点右边或左边)
        let x1, y1, x2, y2;
        if (b._x > a._x) {
          x1 = a._x + NODE_W; y1 = a._cy;
          x2 = b._x; y2 = b._cy;
        } else if (b._x < a._x) {
          x1 = a._x; y1 = a._cy;
          x2 = b._x + NODE_W; y2 = b._cy;
        } else {
          // 同列,从右出右入(回环)
          x1 = a._x + NODE_W; y1 = a._cy;
          x2 = b._x + NODE_W; y2 = b._cy;
        }
        const p = el('path', {
          d: cubicPath(x1, y1, x2, y2),
          class: 'edge',
          'data-key': k
        }, svg);
        edgeMap[k] = {
          path: p,
          x1, y1, x2, y2,
          a, b
        };
      }
    });
  });

  // 箭头标记
  const defs = el('defs', null, svg);
  ['default', 'active', 'highlight'].forEach(t => {
    const marker = el('marker', {
      id: `arrow-${t}`,
      viewBox: '0 0 10 10',
      refX: 9, refY: 5,
      markerWidth: 6, markerHeight: 6,
      orient: 'auto-start-reverse'
    }, defs);
    el('path', {
      d: 'M 0 0 L 10 5 L 0 10 z',
      fill: t === 'active' ? '#58a6ff' : (t === 'highlight' ? '#d29922' : '#2a3340')
    }, marker);
  });
  Object.values(edgeMap).forEach(e => {
    e.path.setAttribute('marker-end', 'url(#arrow-default)');
  });

  // 绘节点
  const nodeEls = {};
  data.nodes.forEach(n => {
    const g = el('g', {
      class: `node type-${n.type}`,
      transform: `translate(${n._x},${n._y})`,
      'data-id': n.id
    }, svg);
    el('rect', { width: NODE_W, height: NODE_H }, g);
    const t1 = el('text', { x: 12, y: 22, class: 'title' }, g);
    t1.textContent = n.label;
    const t2 = el('text', { x: 12, y: 40, class: 'sub' }, g);
    t2.textContent = n.sub || '';
    // 路径 tooltip
    el('title', null, g).textContent = `${n.label}\n${n.sub || ''}\n${n.path || ''}`;
    nodeEls[n.id] = g;
  });

  // 渲染动作按钮
  const actionBar = document.getElementById('action-bar');
  const catGroups = {};
  data.flows.forEach(f => {
    if (!catGroups[f.category]) catGroups[f.category] = [];
    catGroups[f.category].push(f);
  });
  Object.keys(catGroups).forEach(cat => {
    const grp = document.createElement('div');
    grp.className = 'cat-group';
    const lab = document.createElement('span');
    lab.className = 'cat-label';
    lab.textContent = cat;
    grp.appendChild(lab);
    catGroups[cat].forEach(f => {
      const b = document.createElement('button');
      b.textContent = f.title;
      b.dataset.flowId = f.id;
      b.addEventListener('click', () => selectFlow(f.id));
      grp.appendChild(b);
    });
    actionBar.appendChild(grp);
  });

  let activeFlowId = null;
  let focusedStepIdx = -1;
  const stepLabelGroup = el('g', { id: 'step-labels' }, svg);

  function clearActive() {
    Object.values(nodeEls).forEach(g => {
      g.classList.remove('active', 'dim', 'terminal', 'highlight');
    });
    Object.values(edgeMap).forEach(e => {
      e.path.classList.remove('active', 'highlight');
      e.path.setAttribute('marker-end', 'url(#arrow-default)');
    });
    while (stepLabelGroup.firstChild) stepLabelGroup.removeChild(stepLabelGroup.firstChild);
    document.querySelectorAll('nav#action-bar button').forEach(b => b.classList.remove('active'));
  }

  function selectFlow(flowId) {
    activeFlowId = flowId;
    focusedStepIdx = -1;
    clearActive();
    const flow = data.flows.find(f => f.id === flowId);
    if (!flow) return;

    document.querySelector(`nav#action-bar button[data-flow-id="${flowId}"]`).classList.add('active');

    // 所有节点先 dim,再激活路径上的
    Object.values(nodeEls).forEach(g => g.classList.add('dim'));
    const nodeStepCount = {};
    flow.steps.forEach((s, idx) => {
      [s.from, s.to].forEach(id => {
        nodeStepCount[id] = (nodeStepCount[id] || 0) + 1;
        nodeEls[id] && nodeEls[id].classList.remove('dim');
        nodeEls[id] && nodeEls[id].classList.add('active');
      });
      const k = edgeKey(s.from, s.to);
      const e = edgeMap[k];
      if (e) {
        e.path.classList.add('active');
        e.path.setAttribute('marker-end', 'url(#arrow-active)');
      }
    });

    // 终点节点(最后一步的 to)加 terminal 标记
    const terminal = flow.steps[flow.steps.length - 1].to;
    nodeEls[terminal] && nodeEls[terminal].classList.add('terminal');

    // 在每条激活边的中点加序号
    const edgeStepNums = {};
    flow.steps.forEach((s, idx) => {
      const k = edgeKey(s.from, s.to);
      if (!edgeStepNums[k]) edgeStepNums[k] = [];
      edgeStepNums[k].push(idx + 1);
    });
    Object.keys(edgeStepNums).forEach(k => {
      const e = edgeMap[k];
      if (!e) return;
      const nums = edgeStepNums[k].join(',');
      const mx = (e.x1 + e.x2) / 2;
      const my = (e.y1 + e.y2) / 2 - 8;
      const r = 11;
      el('circle', {
        cx: mx, cy: my, r,
        class: 'step-circle',
        'data-edge-key': k
      }, stepLabelGroup);
      const txt = el('text', {
        x: mx, y: my + 4,
        class: 'step-number'
      }, stepLabelGroup);
      txt.textContent = nums;
    });

    renderDetail(flow);
    // 滚动到视口
    const firstNode = nodeMap[flow.steps[0].from];
    if (firstNode) {
      document.getElementById('graph-wrap').scrollTo({
        left: Math.max(0, firstNode._x - 100),
        top: 0,
        behavior: 'smooth'
      });
    }
  }

  function renderDetail(flow) {
    const aside = document.getElementById('detail');
    const tags = (flow.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
    const risk = flow.risk ? `<span class="tag risk">${flow.risk}</span>` : '';
    const gated = flow.gated ? `<span class="tag gated">灰度门控</span>` : '';
    let html = `
      <div class="flow-category">${flow.category}</div>
      <h2 class="flow-title">${flow.title}</h2>
      <div class="flow-meta">${tags}${risk}${gated}</div>
      <div class="flow-desc">${flow.description}</div>
      <h3>流程步骤 (${flow.steps.length})</h3>
      <ol class="steps">
    `;
    flow.steps.forEach((s, idx) => {
      const a = nodeMap[s.from], b = nodeMap[s.to];
      const fromLabel = a ? a.label : s.from;
      const toLabel = b ? b.label : s.to;
      html += `
        <li data-step-idx="${idx}">
          <div class="step-edge">${fromLabel} <span class="arrow">→</span> ${toLabel}</div>
          <div>${s.label || ''}</div>
          ${s.payload ? `<div class="step-payload">载荷: ${s.payload}</div>` : ''}
          ${s.note ? `<div class="step-note">⚠ ${s.note}</div>` : ''}
        </li>
      `;
    });
    html += `</ol>
      <div class="footer-tip">
        提示: 点击步骤可单步聚焦该条边;再次点击或选择其他流程清除聚焦。<br>
        数据驱动: 直接修改本文件内 <code>&lt;script id="workflow-data"&gt;</code> 块即可扩展节点/流程。
      </div>
    `;
    aside.innerHTML = html;
    aside.querySelectorAll('ol.steps li').forEach(li => {
      li.addEventListener('click', () => {
        const idx = parseInt(li.dataset.stepIdx, 10);
        focusStep(idx);
      });
    });
  }

  function focusStep(idx) {
    if (!activeFlowId) return;
    const flow = data.flows.find(f => f.id === activeFlowId);
    if (!flow) return;

    if (focusedStepIdx === idx) {
      // 取消聚焦
      focusedStepIdx = -1;
      selectFlow(activeFlowId);
      return;
    }
    focusedStepIdx = idx;
    const step = flow.steps[idx];

    // 先恢复 active 状态,再叠加 highlight
    Object.values(edgeMap).forEach(e => {
      e.path.classList.remove('highlight');
      if (e.path.classList.contains('active')) {
        e.path.setAttribute('marker-end', 'url(#arrow-active)');
      }
    });
    Object.values(nodeEls).forEach(g => g.classList.remove('highlight'));
    stepLabelGroup.querySelectorAll('circle').forEach(c => c.classList.remove('highlight'));

    const k = edgeKey(step.from, step.to);
    const e = edgeMap[k];
    if (e) {
      e.path.classList.add('highlight');
      e.path.setAttribute('marker-end', 'url(#arrow-highlight)');
    }
    nodeEls[step.from] && nodeEls[step.from].classList.add('highlight');
    nodeEls[step.to] && nodeEls[step.to].classList.add('highlight');

    document.querySelectorAll('aside#detail ol.steps li').forEach(li => {
      li.classList.toggle('focus', parseInt(li.dataset.stepIdx, 10) === idx);
    });
  }

  // 节点点击 → 高亮所有涉及该节点的流程的连边(轻交互)
  data.nodes.forEach(n => {
    const g = nodeEls[n.id];
    g.style.cursor = 'pointer';
    g.addEventListener('click', () => {
      // 找出该节点所参与的流程,默认选第一个
      const found = data.flows.find(f =>
        f.steps.some(s => s.from === n.id || s.to === n.id)
      );
      if (found) selectFlow(found.id);
    });
  });

  // 默认选第一个流程
  if (data.flows.length > 0) {
    selectFlow(data.flows[0].id);
  }
})();
</script>
