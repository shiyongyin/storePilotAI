# 切片 19 — main 分支 push 触发 20 case E2E 全量回归
# 严格按 docs/tanks/19-test-e2e-20-cases.md §6 / §9 step 9 落地：
#   - 触发：push 到 main
#   - 跑 pnpm test:e2e（HTTP + 真实 MySQL + 进程内 MCP mock + 真实 ERP API Key）
#   - 总耗时 < 8 分钟（任务卡 §6 性能要求）
name: E2E (slice 19)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: 20 cases / pnpm test:e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # 真实 MySQL 服务（任务卡 §7 MUST DO §3：测试期 MySQL 不 mock）
    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: store_pilot
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=20

    env:
      # E2E 期间业务模块通过 MYSQL_TEST_URL 拿到的连接字符串
      MYSQL_TEST_URL: mysql://root:rootpw@127.0.0.1:3306/store_pilot
      DATABASE_URL: mysql://root:rootpw@127.0.0.1:3306/store_pilot
      NODE_ENV: test
      # E2E 默认 env（任务卡 §7 MUST NOT §1：禁止外网；以下值仅满足 zod fail-fast）
      MODEL_BASE_URL: http://localhost:7100/llm
      MODEL_API_KEY: sk-test-12345678
      MODEL_NAME: gpt-test
      ERP_MCP_SERVER_URL: http://127.0.0.1:7300/mcp
      MCP_TENANT_SHARED_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      AGENT_API_KEY_HASH_SALT: ci-test-salt-32chars-xxxxxxxxxxxxx
      CORS_ALLOWED_ORIGINS: http://localhost:3210

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @storepilot/shared-contracts build
          pnpm --filter @storepilot/mcp-mock-server build

      # MySQL DDL（包含切片 19 涉及的所有表）
      - name: Apply MySQL migrations
        run: pnpm migrate:up

      # 启动时间戳：用于核对 §6 / §9 step 9 总时长 < 8 min
      - name: E2E start timestamp
        id: e2e-start
        run: echo "ts=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      # 单一目标：跑 20 case；任何 1 case red 即 fail
      - name: Run 20 cases (pnpm test:e2e)
        run: pnpm test:e2e

      - name: E2E end timestamp & duration check
        if: always()
        env:
          START_TS: ${{ steps.e2e-start.outputs.ts }}
        run: |
          end_ts=$(date -u +%s)
          dur=$((end_ts - START_TS))
          echo "E2E duration = ${dur}s"
          # 8 分钟硬上限（任务卡 §6 性能要求）
          if [ "$dur" -gt 480 ]; then
            echo "::error::E2E duration ${dur}s exceeded 480s (§6 limit)"
            exit 1
          fi
