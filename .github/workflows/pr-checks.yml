# 切片 18 — PR 必跑 4 门禁
# 严格按 docs/tanks/18-test-unit-integration.md §7 任务 7 + §9 step 11 落地：
# 触发：pull_request；步骤顺序固定：lint → typecheck → test:cov → check:consistency。
# CI 命中任一红线（一致性 / 覆盖率）必须 fail。
name: PR Checks

on:
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: pr-checks-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    name: lint / typecheck / test:cov / check:consistency
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # 集成测试用真实 MySQL（全局规则：数据库测试不 mock）；MCP 用 in-process 启动器，无需 docker。
    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: store_pilot
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=20

    env:
      # 测试期默认 MySQL 连接（agent-service 集成测试用）
      MYSQL_TEST_URL: mysql://root:rootpw@127.0.0.1:3306
      DATABASE_URL: mysql://root:rootpw@127.0.0.1:3306/store_pilot
      NODE_ENV: test
      # 测试默认 env（避免 env zod fail-fast；真实值仅在 E2E / 部署使用）
      MODEL_BASE_URL: http://localhost:7100/llm
      MODEL_API_KEY: sk-test-12345678
      MODEL_NAME: gpt-test
      ERP_MCP_SERVER_URL: http://127.0.0.1:7300/mcp
      MCP_TENANT_SHARED_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      AGENT_API_KEY_HASH_SALT: ci-test-salt-32chars-xxxxxxxxxxxxx
      CORS_ALLOWED_ORIGINS: http://localhost:3210

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages (shared-contracts + mcp-mock-server)
        run: |
          pnpm --filter @storepilot/shared-contracts build
          pnpm --filter @storepilot/mcp-mock-server build

      # 步骤 1 — lint（任务卡 §9 step 9 + §T-TEST-01.5 §9）
      - name: Lint
        run: pnpm lint

      # 步骤 2 — typecheck
      - name: Typecheck
        run: pnpm typecheck

      # 步骤 3 — test + coverage（vitest workspace 三 project；输出 coverage-summary.json）
      - name: Test with coverage
        run: pnpm test:cov

      # 步骤 4 — 一致性 grep（4 类规则；命中即 fail）
      - name: Consistency check (grep 4 rules)
        run: pnpm check:consistency

      # 覆盖率门禁（bridge ≥ 95% / safety ≥ 90% / workflows ≥ 80%）
      - name: Coverage gate
        run: pnpm cov:check
