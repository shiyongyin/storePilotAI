# ============================================================================
# 门店助手 Agent V1 — Nginx 反向代理（切片 20 / T-OPS-01 §8.4 落地）
#
# 关键约束（任务卡 20 §7 MUST DO §6 + §11）：
#   1. proxy_buffering off            → SSE chunk 实时下发，不积压
#   2. chunked_transfer_encoding off  → 不强制额外 chunked 包装（Hono streamSSE 已分块）
#   3. proxy_request_buffering off    → 上传体积大时也不缓存到磁盘再转发
#   4. add_header X-Accel-Buffering no→ 显式告知下游 / CDN 不要再 buffer
#   5. proxy_http_version 1.1         → 必须 HTTP/1.1（HTTP/2 默认 32KB buffer 破坏 SSE）
#   6. proxy_set_header Connection "" → 让 keepalive 上行复用 upstream 连接
#   7. proxy_read_timeout 600s        → SSE 长连接最多读 10 分钟，足够日报 / 月报全程渲染
#   8. /health location 走 5s 超时    → 健康检查不能被 600s SSE 路径覆盖
#
# HTTP/2 警告（任务卡 §7 MUST DO §7）：
#   LobeChat ↔ Agent 必须 HTTP/1.1。HTTP/2 默认会把响应缓冲到 32KB 才下发，
#   破坏 SSE 实时体验，且与上面 chunked_transfer_encoding off 互相干扰。
#   反代到 LobeChat 的链路 ↔ 浏览器可以 HTTPS+HTTP/2；本配置仅约束 Nginx → Agent。
#
# 生产部署：把本文件挂进 /etc/nginx/conf.d/agent.conf 或合并进 nginx.conf 的
# `http {}` 块；TLS 证书 / SAN / OCSP stapling 由运维脚本独立维护。
# ============================================================================

upstream agent_backend {
  server agent-service:7100;
  keepalive 32;
}

server {
  listen 443 ssl;
  http2 off;                      # 禁用 HTTP/2（保证 LobeChat ↔ Agent 走 HTTP/1.1）
  server_name agent.example.com;

  # TLS 占位（请替换为真实证书路径）。本切片仅展示协议要点。
  ssl_certificate     /etc/nginx/tls/agent.crt;
  ssl_certificate_key /etc/nginx/tls/agent.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # ----------------------------------------------------------------------
  # /v1/ — OpenAI Compatible SSE 路径（LobeChat → Agent → LLM）
  # 关键：buffering 全关 + HTTP/1.1 + 600s 长连接
  # ----------------------------------------------------------------------
  location /v1/ {
    proxy_pass http://agent_backend;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;

    # SSE 关键：禁止 Nginx 缓冲响应 / 缓冲请求 / 强制 chunked 重新打包
    proxy_buffering off;
    chunked_transfer_encoding off;
    proxy_request_buffering off;

    # 上线告知下游 / CDN 不要再 buffer
    add_header X-Accel-Buffering no always;

    # SSE 长连接窗口（>= 10 分钟，覆盖月报 / 补货大请求场景）
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }

  # ----------------------------------------------------------------------
  # /health — 仅给运维 / K8s liveness 用；读超时 5s（任务卡 §7 §3：< 100ms 性能）
  # ----------------------------------------------------------------------
  location /health {
    proxy_pass http://agent_backend/health;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_read_timeout 5s;
    proxy_send_timeout 5s;
    proxy_buffering off;
  }

  # ----------------------------------------------------------------------
  # /health/* — readiness 子项（/health/db / /health/mcp / /health/model / /health/ready）
  # 单子项 5s；readiness 聚合 db + mcp，不含 model（外网模型抖动会让所有 pod 不可用）
  # ----------------------------------------------------------------------
  location ~ ^/health/(db|mcp|model|ready)$ {
    proxy_pass http://agent_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_read_timeout 5s;
    proxy_send_timeout 5s;
    proxy_buffering off;
  }
}
